{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block title %}
Register for Blango
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <h2>Create an Account</h2>

        {% crispy form %}

        <p class="mt-3">
            Already have an account?
            <a href="{% url 'login' %}">
                Log in
            </a>
        </p>

    </div>
</div>

{% endblock %}
